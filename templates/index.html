<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Le Mag Campus Nancy — la veille étudiante du campus Eduservices</title>
<meta name="description" content="Le Mag Campus Nancy — la veille pro pour les étudiants du campus Eduservices Nancy. Culture générale, anglais, CEJM, marketing, communication, RH, gestion, IA — articles, vidéos, études et podcasts triés par les profs." />
<meta name="theme-color" content="#0F172A" />
<meta property="og:title" content="Le Mag Campus Nancy" />
<meta property="og:description" content="La veille pro qui sert tes études. 12 thématiques · Le Récap chaque semaine." />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%233AA76D'/%3E%3Cpath d='M9 22 L9 10 L16 18 L23 10 L23 22' stroke='%23fff' stroke-width='2.5' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Host+Grotesk:ital,wght@0,300..800;1,300..800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<style>:root{ --cyan: {{ theme_color }}; --secondary: {{ theme_secondary }}; }</style>
<script>
  window.TABLONOIR = { defaultThematic: "{{ default_thematic }}", shopUrl: "{{ shop_url }}", buildDate: "{{ build_date }}", buildYear: "{{ build_year }}", siteName: "Le Mag Campus Nancy" };
</script>
</head>
<body>
<nav class="topnav">
  <div class="topnav-inner">
    <a class="brand" href="#">
      <div class="brand-mark"></div>
      <div class="brand-text">
        <span class="name">Le Mag <span style="color: var(--cyan);">Campus Nancy</span></span>
        <span class="sub">La veille qui sert tes études</span>
      </div>
    </a>
    <div class="nav-search">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="globalSearch" placeholder="Rechercher une notion, un thème..." autocomplete="off" />
    </div>
    <div class="topnav-actions">
      <button class="nav-btn icon-only" onclick="toggleTheme()" title="Basculer thème clair / sombre">
        <svg id="themeIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
      <a class="nav-btn" href="#">Accueil</a>
      <a class="nav-btn nav-btn-ghost" id="shopCta" href="#" target="_blank" rel="noopener">Le campus</a>
    </div>
  </div>
</nav>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-section">
      <a class="sidebar-item home-link" id="homeNav" href="#" style="display:none">
        <span class="label">← Tous les thèmes</span>
      </a>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label" id="modulesLabel">Les 12 thèmes</div>
      <div id="moduleNav"></div>
    </div>
    <div class="sidebar-footer"><span class="mono" id="footMeta">Le Mag Campus Nancy</span></div>
  </aside>
  <main class="main" id="mainContent">
    <div class="skeleton-page">
      <div class="skeleton skeleton-hero"></div>
      <div class="skeleton-band">
        <div class="skeleton skeleton-tag"></div>
        <div class="skeleton skeleton-title"></div>
        <div class="skeleton-grid">
          <div class="skeleton skeleton-card"></div>
          <div class="skeleton skeleton-card"></div>
          <div class="skeleton skeleton-card"></div>
          <div class="skeleton skeleton-card"></div>
          <div class="skeleton skeleton-card"></div>
          <div class="skeleton skeleton-card"></div>
        </div>
      </div>
    </div>
  </main>
</div>
<nav class="bottom-nav" aria-label="Navigation principale mobile">
  <a class="bn-item" href="#" aria-label="Accueil">
    <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    <span>Accueil</span>
  </a>
  <a class="bn-item" href="#" onclick="document.querySelector('#mainContent .theme-grid')?.scrollIntoView({behavior:'smooth'});return false;" aria-label="Thèmes">
    <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
    <span>Thèmes</span>
  </a>
  <a class="bn-item bn-accent" href="#theme/ia-outils" aria-label="Rubrique IA">
    <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v3M12 18v3M3 12h3M18 12h3M5.6 5.6l2.1 2.1M16.3 16.3l2.1 2.1M5.6 18.4l2.1-2.1M16.3 7.7l2.1-2.1"/><circle cx="12" cy="12" r="4"/></svg>
    <span>IA</span>
  </a>
</nav>
<script src="{{ url_for('static', filename='js/app.js') }}"></script>
<script src="{{ url_for('static', filename='js/annotations.js') }}" defer></script>
</body>
</html>
